AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  dop-serverless-2026

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - dev
      - qa
      - prod
    Description: The stage of the application (e.g., qa, prod)

  AllowedCorsOrigin:
    Type: String
    Default: "*"
    Description: Origin allowed by API Gateway CORS. Use a specific domain for production workloads.

Conditions:
  IsProd: !Equals [!Ref Stage, prod]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref TaskDynamoDBTable
    Tags:
      createdBy: SAM
      stage: !Ref Stage

Resources:
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  TaskApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/task-api-${Stage}"
      RetentionInDays: !If [IsProd, 90, 14]

  TaskApi:
    Type: AWS::Serverless::Api
    DependsOn: ApiGatewayAccount
    Properties:
      Name: !Sub "task-api-${Stage}"
      StageName: !Ref Stage
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt TaskApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: false
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowOrigin: !Sub "'${AllowedCorsOrigin}'"
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: !Sub "task-api-usage-plan-${Stage}"
          Quota:
            Limit: 1000
            Period: DAY
          Throttle:
            BurstLimit: 50
            RateLimit: 10

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Health check endpoint for the application
      CodeUri: src/
      Handler: health_check.app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref HealthCheckFunctionErrorAlarm
      Events:
        HealthCheck:
          Type: Api
          Properties:
              RestApiId: !Ref TaskApi
              Path: /health
              Method: get

  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Create task endpoint for the application
      CodeUri: src/
      Handler: create_task.app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref CreateTaskFunctionErrorAlarm
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt TaskDynamoDBTable.Arn
      Events:
        CreateTask:
          Type: Api
          Properties:
              RestApiId: !Ref TaskApi
              Path: /create_task
              Method: post

  GetTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Get a single task by task_id
      CodeUri: src/
      Handler: get_task.app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref GetTaskFunctionErrorAlarm
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TaskDynamoDBTable
      Events:
        GetTask:
          Type: Api
          Properties:
              RestApiId: !Ref TaskApi
              Path: /tasks/{task_id}
              Method: get

  ListTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: List all tasks
      CodeUri: src/
      Handler: list_task.app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref ListTasksFunctionErrorAlarm
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TaskDynamoDBTable
      Events:
        ListTask:
          Type: Api
          Properties:
              RestApiId: !Ref TaskApi
              Path: /tasks
              Method: get

  UpdateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Update the status of an existing task
      CodeUri: src/
      Handler: update_task.app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref UpdateTaskFunctionErrorAlarm
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt TaskDynamoDBTable.Arn
      Events:
        UpdateTask:
          Type: Api
          Properties:
              RestApiId: !Ref TaskApi
              Path: /tasks/{task_id}
              Method: put

  TaskDynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProd, Retain, Delete]
    UpdateReplacePolicy: !If [IsProd, Retain, Delete]
    Properties:
      TableName: !Sub "tasks-${Stage}"
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProd, true, false]
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: false
      Tags:
        - Key: createdBy
          Value: SAM
        - Key: stage
          Value: !Ref Stage

  HealthCheckFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HealthCheckFunction-Errors-${Stage}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref HealthCheckFunction
        - Name: Resource
          Value: !Sub "${HealthCheckFunction}:live"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  CreateTaskFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "CreateTaskFunction-Errors-${Stage}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CreateTaskFunction
        - Name: Resource
          Value: !Sub "${CreateTaskFunction}:live"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  GetTaskFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "GetTaskFunction-Errors-${Stage}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref GetTaskFunction
        - Name: Resource
          Value: !Sub "${GetTaskFunction}:live"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ListTasksFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "ListTasksFunction-Errors-${Stage}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ListTasksFunction
        - Name: Resource
          Value: !Sub "${ListTasksFunction}:live"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  UpdateTaskFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "UpdateTaskFunction-Errors-${Stage}"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UpdateTaskFunction
        - Name: Resource
          Value: !Sub "${UpdateTaskFunction}:live"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  TaskApi5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TaskApi-5XX-${Stage}"
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "task-api-${Stage}"
        - Name: Stage
          Value: !Ref Stage
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  TaskApiHighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TaskApi-HighLatency-${Stage}"
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiName
          Value: !Sub "task-api-${Stage}"
        - Name: Stage
          Value: !Ref Stage
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  TaskApiUrl:
    Description: URL for the Task API
    Value: !Sub "https://${TaskApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Stage}/"

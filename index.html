<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preparando para DOP-C02</title>
    <style>
      :root{
        --bg-1: #0b0f14;
        --bg-2: #0e1620;
        --accent: #6ee7b7;
        --muted: #a6b0bb;
      }
      html,body{
        height:100%;
        margin:0;
        font-family: Inter, Roboto, Arial, sans-serif;
        background: linear-gradient(135deg,var(--bg-1),var(--bg-2));
        color:#ffffff;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
      }
      .container{
        min-height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
      }
      .card{
        max-width:880px;
        width:100%;
        text-align:center;
        padding:48px 36px;
        border-radius:12px;
        box-shadow: 0 8px 30px rgba(2,6,23,0.6);
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      }
      h1{
        margin:0 0 8px 0;
        font-size:clamp(24px,4vw,44px);
        letter-spacing: -0.02em;
      }
      p.lead{
        margin:0 0 20px 0;
        color:var(--muted);
        font-size:clamp(14px,1.4vw,18px);
      }
      .tag{
        display:inline-block;
        padding:6px 10px;
        border-radius:999px;
        background:rgba(110,231,183,0.12);
        color:var(--accent);
        font-weight:600;
        font-size:13px;
        margin-bottom:18px;
      }
      .actions{
        margin-top:20px;
        display:flex;
        gap:12px;
        justify-content:center;
        flex-wrap:wrap;
      }
      .btn{
        background:transparent;
        border:1px solid rgba(255,255,255,0.08);
        color:#fff;
        padding:10px 16px;
        border-radius:8px;
        text-decoration:none;
        font-weight:600;
      }
      .btn.primary{
        background:linear-gradient(90deg,var(--accent),#4fd1c5);
        border: none;
        color:#061118;
      }
      footer{
        margin-top:28px;
        color:rgba(255,255,255,0.22);
        font-size:13px;
      }
      @media (prefers-color-scheme: light){
        /* keep dark look */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="tag">Preparación</div>
        <h1>Preparando para DOP-C02</h1>
        <p class="lead">Resumen breve — repasando conceptos de DevOps en AWS y prácticas para el examen DOP-C02.</p>
        <div class="actions">
          <a class="btn primary" href="#">Comenzar</a>
          <a class="btn" href="#">Recursos</a>
        </div>
        <footer>Si quieres, puedo añadir enlaces a guías, cronogramas o tarjetas de estudio.</footer>
      </div>
    </div>
  </body>
</html>
